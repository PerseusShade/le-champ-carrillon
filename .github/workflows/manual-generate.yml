name: Génération manuelle du site

on:
    workflow_dispatch:
        inputs:
            target:
                description: 'Que veux-tu regénérer ?'
                required: true
                default: 'tout'
                type: choice
                options:
                    - tout
                    - actualites
                    - index
                    - galerie

permissions:
    contents: write

jobs:
    generate:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '18'

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: '3.x'

            - name: Run generators
              run: |
                  if [ "${{ github.event.inputs.target }}" = "actualites" ] || [ "${{ github.event.inputs.target }}" = "tout" ]; then
                      echo "Génération des actualités..."
                      python3 scripts/generate_actualites.py
                  fi
                  if [ "${{ github.event.inputs.target }}" = "index" ] || [ "${{ github.event.inputs.target }}" = "tout" ]; then
                      echo "Génération de l'index..."
                      node scripts/generate_index_json.js
                  fi
                  if [ "${{ github.event.inputs.target }}" = "galerie" ] || [ "${{ github.event.inputs.target }}" = "tout" ]; then
                      echo "Génération de la galerie..."
                      node scripts/generate_galerie_json.js
                  fi

            - name: Commit and push changes
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  git add -A

                  if git diff --staged --quiet; then
                      echo "Aucun changement à committer."
                  else
                      git commit -m "chore: regénération manuelle (${{ github.event.inputs.target }}) [skip ci]"
                      git push
                  fi
